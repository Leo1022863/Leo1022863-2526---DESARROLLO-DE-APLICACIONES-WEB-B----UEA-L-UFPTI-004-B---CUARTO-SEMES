<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Lista de Productos</title>
</head>

<body>
    <h1>Catálogo de Productos</h1>

    <div id="formulario"
        style="display: none; border: 2px solid #3498db; padding: 20px; border-radius: 5px; margin-bottom: 20px; background-color: #f8f9fa;">
        <h2 style="margin-top: 0; color: #3498db;">Nuevo Producto</h2>
        <div style="margin-bottom: 10px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Nombre del producto:</label>
            <input type="text" id="inputNombre"
                style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 3px;">
        </div>
        <div style="margin-bottom: 10px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Precio:</label>
            <input type="number" id="inputPrecio" step="0.01" min="0"
                style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 3px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Descripción:</label>
            <textarea id="inputDescripcion" rows="3"
                style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 3px;"></textarea>
        </div>
        <button id="btnGuardar" style="background-color: #27ae60; margin-right: 10px;">Guardar Producto</button>
        <button id="btnCancelar" style="background-color: #e74c3c;">Cancelar</button>
    </div>

    <ul id="listaProductos"></ul>
    <button id="btnAgregar">Agregar Nuevo Producto</button>
</body>

</html>
